{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Traffic Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body class="auth-page d-flex align-items-center justify-content-center min-vh-100">
<div class="card auth-card p-4 shadow-lg">
    <h3 class="text-center mb-3">Traffic Management System</h3>
    <form method="post">{% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control auth-input" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control auth-input" required>
        </div>
        <button class="btn btn-primary w-100 mb-2">Login</button>
        <div class="text-center">
            <a href="{% url 'register' %}" class="btn btn-outline-primary w-100">Create an account</a>
        </div>
    </form>
</div>
</body>
</html>
